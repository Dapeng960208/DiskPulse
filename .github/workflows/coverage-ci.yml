name: Coverage CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13.0

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Enforce QuestDB UTC time contract
        run: python -m pytest backend/test/test_questdb_time_contract_guard.py -q

      - name: Run backend coverage
        run: |
          python -m coverage erase
          python -m coverage run -m pytest backend/test -q
          python -m coverage report

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run frontend coverage
        working-directory: frontend
        run: pnpm run test:coverage

      - name: Lint frontend
        working-directory: frontend
        run: pnpm run lint

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build:prod
