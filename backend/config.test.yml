application:
  mode: test
  company_name: DiskPulse Test
  cors_origins:
    - http://localhost:5173

database:
  create_tables: false
  postgres:
    host: localhost
    port: 5432
    name: diskpulse_test
    user: test
    password: test
    pool_size: 5
    max_overflow: 0
    pool_timeout: 5
  questdb:
    host: localhost
    port: 8812
    user: test
    password: test
    pool_size: 5
    max_overflow: 0
    pool_timeout: 5
    pool_recycle: 300

redis:
  host: localhost
  port: 6379
  session_db: 8

observability:
  metrics_token_file: ./metrics-token.test

incident_notifications:
  enabled: false
  notify_administrators: true
  notify_project_owner: false
  notify_project_members: false
  extra_usernames: []
  feishu_enabled: false
  email_enabled: false

incident_analytics:
  replay_gate_verified: false
  correlation_window_hours: 4

ai:
  config_secret_key: test-ai-config-secret-key
  request_timeout_seconds: 60
  chat_tool_max_iterations: 4
  chat_rate_limit_per_minute: 10

jwt:
  secret_key: test-jwt-secret-key-for-unit-tests-32
  access_ttl_minutes: 10080

ldap:
  uri: ldap://dc.example.com
  starttls: true
  timeout_seconds: 5
  bind_dn: CN=Service,OU=IT,DC=example,DC=com
  bind_password_file: ./ldap-password.test
  user_bases:
    - OU=Users,DC=example,DC=com
  group_bases:
    - OU=Groups,DC=example,DC=com
  user_class: user
  user_name_attribute: sAMAccountName
  user_fullname_attribute: cn
  user_department_attribute: department
  user_extra_filters:
    - (!(objectClass=computer))
    - (!(objectClass=group))
  lookup_user_dn: true
  lookup_as_user: false

super_admin_usernames:
  - alice
