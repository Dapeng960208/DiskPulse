application:
  mode: dev
  company_name: DiskPulse
  cors_origins:
    - http://localhost:5173
    - http://127.0.0.1:5173

database:
  # true 时启动会初始化 PostgreSQL 表并升级 QuestDB revision。
  create_tables: false
  postgres:
    host: localhost
    port: 5432
    name: diskpulse
    user: diskpulse
    password: change-me
    pool_size: 20
    max_overflow: 10
    pool_timeout: 10
  questdb:
    host: localhost
    port: 8812
    user: admin
    password: change-me
    pool_size: 20
    max_overflow: 0
    pool_timeout: 60
    pool_recycle: 300

redis:
  host: localhost
  port: 6379
  session_db: 8

observability:
  # 文件内容是 Prometheus 抓取使用的单个令牌；由部署系统以最小权限挂载，不提交真实令牌。
  metrics_token_file: ./metrics-token.dev

ai:
  # 使用独立随机密钥加密数据库中的 AI API Key，不要复用生产 JWT 密钥。
  config_secret_key: change-me-with-an-independent-random-secret
  # 以下三项只约束 AI 对话的 Provider 请求、工具循环和聊天入口限流，不复用事件审计配置。
  request_timeout_seconds: 60
  chat_tool_max_iterations: 4
  chat_rate_limit_per_minute: 10

jwt:
  secret_key: change-me-with-a-random-secret
  access_ttl_minutes: 10080

ldap:
  uri: ldap://dc.example.com
  starttls: true
  timeout_seconds: 5
  bind_dn: CN=Service Account,OU=IT,DC=example,DC=com
  bind_password_file: ./ldap-password.dev
  user_bases:
    - OU=Users,DC=example,DC=com
  group_bases:
    - OU=Groups,DC=example,DC=com
  user_class: user
  user_name_attribute: sAMAccountName
  user_fullname_attribute: cn
  user_department_attribute: department
  user_extra_filters:
    - (!(objectClass=computer))
    - (!(objectClass=group))
  lookup_user_dn: true
  lookup_as_user: false

super_admin_usernames:
  - admin

feishu_notification:
  enabled: false
  base_url: https://feishu-notifier.example.com/api
  app: feishu_bot
  app_key: replace-with-secret
  timeout_seconds: 5
  tls_verify: true
  debug: false
  cc_usernames: []

# 仅控制派生 Incident，不影响既有 DiskPulse 告警或厂商系统事件。
incident_notifications:
  enabled: false
  notify_administrators: true
  notify_project_owner: false
  notify_project_members: false
  extra_usernames: []
  email_enabled: false
  feishu_enabled: false

# 仅在固定历史回放验收完成后由部署人员显式开启高置信度标签。
incident_analytics:
  replay_gate_verified: false
  correlation_window_hours: 4
